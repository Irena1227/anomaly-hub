<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Anomaly Gate · 偏差之门</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: linear-gradient(135deg, #f8f5ff 0%, #fcf7ff 38%, #fff0f5 100%);
    --glass: rgba(255, 255, 255, 0.58);
    --glass-strong: rgba(255, 255, 255, 0.72);
    --border: rgba(125, 103, 163, 0.12);
    --text: #342b46;
    --muted: #7f7497;
    --soft: #9d95af;
    --shadow: 0 18px 50px rgba(116, 91, 150, 0.10);
    --shadow-hover: 0 24px 60px rgba(116, 91, 150, 0.16);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      linear-gradient(rgba(248, 245, 255, 0.06), rgba(255, 240, 245, 0.04)),
      url("xianing-bg.jpg") center top / cover no-repeat fixed,
      var(--bg-main);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before,
  body::after {
    content: none;
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  .app-shell {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 22px;
    padding: 24px;
    min-height: 100vh;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 26px 18px 18px;
    border-radius: 30px;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    min-height: calc(100vh - 48px);
    position: sticky;
    top: 24px;
  }

  .brand-wrap { display: flex; flex-direction: column; gap: 18px; }
  .brand-top { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px; padding-top: 12px; }
  .avatar-orb {
    width: 154px;
    height: 202px;
    margin-top: 18px;
    margin-bottom: 6px;
    border-radius: 0;
    background: url("anomaly-avatar.png") center / contain no-repeat;
    box-shadow: none;
    position: relative;
    overflow: visible;
    filter: drop-shadow(0 8px 20px rgba(132, 103, 170, 0.16));
  }
  .avatar-orb::after {
    content: none;
  }
  .brand-title {
    font-size: 13px;
    letter-spacing: 0.24em;
    font-weight: 700;
    color: #514765;
  }
  .brand-stars {
    font-size: 11px;
    letter-spacing: 0.30em;
    color: #9d8cbf;
  }

  .menu { display: flex; flex-direction: column; gap: 8px; margin-top: 6px; }
  .menu-item {
    display: grid;
    grid-template-columns: 22px 1fr;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 16px;
    color: #4f455f;
    background: transparent;
    border: 0;
    font: inherit;
    cursor: pointer;
    transition: all 180ms ease;
    text-align: left;
  }
  .menu-item:hover { background: rgba(255,255,255,0.26); color: #342c45; }
  .menu-item.active {
    background: rgba(255,255,255,0.52);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.45), 0 6px 18px rgba(120, 95, 150, 0.08);
    color: #302840;
  }
  .menu-emoji { width: 22px; height: 22px; display: inline-flex; align-items: center; justify-content: center; font-size: 16px; opacity: 0.92; }
  .menu-label { font-size: 14px; font-weight: 600; }

  .settings-panel {
    position: fixed;
    top: 24px;
    right: 24px;
    width: min(420px, calc(100vw - 32px));
    max-height: calc(100vh - 48px);
    overflow: auto;
    padding: 20px;
    border-radius: 24px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(255,255,255,0.62);
    backdrop-filter: blur(24px) saturate(145%);
    -webkit-backdrop-filter: blur(24px) saturate(145%);
    box-shadow: 0 20px 60px rgba(76, 56, 104, 0.18);
    z-index: 60;
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }
  .settings-title {
    font-size: 18px;
    font-weight: 700;
    color: #46385e;
  }
  .settings-close {
    border: none;
    background: rgba(91, 77, 120, 0.08);
    color: #66557f;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
  }
  .settings-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.56);
    border: 1px solid rgba(187, 171, 214, 0.18);
    margin-bottom: 14px;
  }
  .settings-block h3 {
    margin: 0;
    font-size: 15px;
    color: #4c4062;
  }
  .settings-text {
    font-size: 13px;
    line-height: 1.6;
    color: #857a9a;
  }
  .settings-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .settings-btn {
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    background: #8c65d5;
    color: #fff;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .settings-btn.secondary {
    background: rgba(91, 77, 120, 0.10);
    color: #625577;
  }
  .settings-input,
  .settings-select,
  .settings-textarea {
    width: 100%;
    border: 1px solid rgba(170, 154, 196, 0.32);
    background: rgba(255,255,255,0.84);
    border-radius: 14px;
    padding: 11px 12px;
    font: inherit;
    font-size: 14px;
    color: #3f3355;
    outline: none;
  }
  .settings-textarea {
    min-height: 74px;
    resize: vertical;
  }
  .settings-label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    color: #817694;
  }
  .thumb-preview {
    width: 100%;
    height: 120px;
    border-radius: 18px;
    background: rgba(240, 231, 250, 0.8) center / cover no-repeat;
    border: 1px dashed rgba(160, 140, 194, 0.4);
  }

  .main {
    min-width: 0;
    border-radius: 34px;
    padding: 36px;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    position: relative;
    overflow: visible;
  }
  .main::before {
    content: none;
  }
  .main::after {
    content: none;
  }

  .mobile-topbar { display: none; }

  .hero {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-bottom: 30px;
  }
  .hero-copy { max-width: 780px; }
  .eyebrow {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: #a194b9;
    margin-bottom: 10px;
  }
  .hero-title {
    margin: 0;
    font-size: clamp(44px, 5vw, 66px);
    line-height: 0.98;
    letter-spacing: -0.05em;
  }
  .hero-title .dark { color: #2e2540; font-weight: 800; }
  .hero-title .accent {
    color: #8c65d5;
    font-weight: 700;
    font-style: italic;
    font-family: "Noto Serif SC", serif;
    margin-left: 10px;
  }
  .hero-subtitle {
    margin-top: 14px;
    font-size: 15px;
    color: #6e6487;
    font-weight: 500;
  }
  .hero-desc {
    margin-top: 6px;
    font-size: 14px;
    color: #8f85a8;
  }

  .search-bar {
    width: min(640px, 100%);
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.76);
    border: 1px solid rgba(255,255,255,0.68);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.72), 0 10px 28px rgba(128, 100, 162, 0.09);
  }
  .search-icon { color: #9e93b6; display: flex; }
  .search-input {
    width: 100%;
    background: transparent;
    border: 0;
    outline: none;
    color: #43385c;
    font-size: 15px;
    font-family: inherit;
  }
  .search-input::placeholder { color: #b0a6c5; }
  .search-shortcut {
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(241, 236, 250, 0.95);
    color: #8e83ab;
    font: 500 12px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.06em;
  }

  .section-list {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .section-block { display: flex; flex-direction: column; gap: 16px; }
  .section-content {
    display: grid;
    grid-template-rows: 1fr;
    opacity: 1;
    transform: translateY(0);
    transition: grid-template-rows 280ms ease, opacity 240ms ease, transform 240ms ease;
  }
  .section-content.collapsed {
    grid-template-rows: 0fr;
    opacity: 0;
    transform: translateY(-6px);
  }
  .section-content-inner {
    overflow: hidden;
    padding-top: 2px;
  }
  .section-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .section-head {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding-left: 0;
    border: none;
    background: transparent;
    cursor: pointer;
  }
  .section-arrow {
    width: 26px;
    height: 26px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.42);
    color: #6f618c;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.55);
    transition: transform 180ms ease, background 180ms ease;
    flex: 0 0 auto;
  }
  .section-head:hover .section-arrow {
    background: rgba(255,255,255,0.58);
  }
  .section-arrow.collapsed {
    transform: rotate(-90deg);
  }
  .view-stage {
    animation: viewFade 320ms ease;
    transform-origin: top center;
  }
  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #423654;
  }
  .section-subtitle {
    font-size: 14px;
    color: #9b92b0;
  }
  .section-toggle-all {
    border: none;
    border-radius: 999px;
    padding: 7px 12px;
    background: rgba(255,255,255,0.46);
    color: #6c6083;
    font: inherit;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.58), 0 6px 16px rgba(120, 95, 150, 0.06);
    white-space: nowrap;
  }
  .section-toggle-all:hover {
    background: rgba(255,255,255,0.62);
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }
  .portal-card {
    display: grid;
    grid-template-columns: 88px minmax(0, 1fr);
    gap: 18px;
    align-items: center;
    padding: 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.48);
    background: rgba(255,255,255,0.44);
    backdrop-filter: blur(14px) saturate(125%);
    -webkit-backdrop-filter: blur(14px) saturate(125%);
    box-shadow: 0 8px 24px rgba(121, 97, 151, 0.06);
    cursor: pointer;
    transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    min-height: 144px;
  }
  .portal-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 34px rgba(121, 97, 151, 0.10);
    border-color: rgba(184, 162, 214, 0.34);
  }
  .icon-tile {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background-size: cover !important;
    background-position: center !important;
    background-repeat: no-repeat !important;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 12px 24px rgba(125, 103, 163, 0.10);
    position: relative;
    overflow: hidden;
  }
  .icon-tile::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0));
    pointer-events: none;
  }
  .tile-favicon {
    position: absolute;
    inset: 50%;
    width: 72px;
    height: 72px;
    transform: translate(-50%, -50%);
    object-fit: contain;
    filter: drop-shadow(0 4px 10px rgba(92, 73, 122, 0.14));
  }
  .card-body {
    min-width: 0;
    display: grid;
    grid-template-rows: 1fr auto;
    align-items: center;
    gap: 10px;
    height: 100%;
    padding: 2px 0;
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #312842;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #7f7595;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-bottom {
    display: flex;
    justify-content: flex-end;
    align-self: end;
    margin-top: 0;
  }
  .card-arrow {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.86);
    color: #7f6caa;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(125, 103, 163, 0.12);
  }

  .empty-state {
    padding: 24px;
    border-radius: 18px;
    color: #8b80a4;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.56);
  }

  .toast-stack {
    position: fixed;
    right: 24px;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 40;
  }
  .toast {
    min-width: 240px;
    max-width: 320px;
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(59, 46, 80, 0.88);
    color: #fff;
    box-shadow: 0 16px 40px rgba(25, 19, 36, 0.24);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    animation: rise 220ms ease;
  }
  .toast-title { font-size: 14px; font-weight: 700; }
  .toast-text { margin-top: 4px; font-size: 12px; color: rgba(255,255,255,0.82); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes viewFade {
    from { opacity: 0; transform: translateY(12px) scale(0.992); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (max-width: 1260px) {
    .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 900px) {
    body {
      background: linear-gradient(180deg, #f4eef9 0%, #f5f0fa 52%, #f4eef9 100%);
      background-attachment: scroll;
    }
    #root {
      overflow-x: hidden;
    }
    .app-shell {
      grid-template-columns: 1fr;
      gap: 0;
      padding: 0;
      min-height: 100vh;
    }
    .sidebar {
      display: none;
    }
    .main {
      padding: 0 16px calc(94px + env(safe-area-inset-bottom, 0));
      border-radius: 0;
      overflow: visible;
    }
    .mobile-topbar {
      position: absolute;
      top: 14px;
      left: 16px;
      right: 16px;
      z-index: 5;
      display: flex;
      justify-content: flex-start;
      align-items: center;
    }
    .mobile-menu-btn {
      width: 38px;
      height: 38px;
      border: none;
      border-radius: 999px;
      background: rgba(255,255,255,0.54);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 4px 14px rgba(167, 145, 210, 0.10);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #8f84a7;
    }
    .hero {
      position: relative;
      min-height: 258px;
      margin: 0 -16px;
      padding: 18px 18px 0;
      border-radius: 0 0 30px 30px;
      overflow: hidden;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.72) 0%, rgba(255,255,255,0.10) 26%, transparent 56%),
        radial-gradient(circle at 78% 14%, rgba(255,255,255,0.40) 0%, rgba(255,255,255,0.08) 18%, transparent 40%),
        radial-gradient(circle at 60% 76%, rgba(206,191,244,0.22) 0%, transparent 32%),
        linear-gradient(180deg, #f0e9fb 0%, #eee7fa 42%, #f4effa 100%);
      box-shadow: 0 14px 34px rgba(154, 128, 198, 0.08);
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 16% 28%, rgba(255,255,255,0.65) 0%, transparent 16%),
        radial-gradient(circle at 88% 20%, rgba(255,255,255,0.30) 0%, transparent 14%),
        linear-gradient(90deg, rgba(247,243,251,0.94) 0%, rgba(247,243,251,0.86) 22%, rgba(247,243,251,0.46) 42%, rgba(247,243,251,0.06) 64%, transparent 78%);
      pointer-events: none;
      z-index: 1;
    }
    .hero::after {
      content: '';
      position: absolute;
      right: -6px;
      top: 2px;
      width: 67%;
      height: 94%;
      background: url("xianing-bg.jpg") right top / contain no-repeat;
      opacity: 0.76;
      filter: saturate(0.92) brightness(1.04);
      pointer-events: none;
      z-index: 0;
      mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 56%, rgba(0,0,0,0.54) 76%, transparent 100%);
      -webkit-mask-image: linear-gradient(to left, rgba(0,0,0,0.95) 56%, rgba(0,0,0,0.54) 76%, transparent 100%);
    }
    .hero-copy {
      position: relative;
      z-index: 2;
      max-width: 49%;
      padding-top: 54px;
      padding-left: 2px;
    }
    .eyebrow {
      display: none;
    }
    .hero-title {
      font-size: clamp(31px, 10.6vw, 43px);
      line-height: 0.90;
      letter-spacing: -0.065em;
      margin: 0;
    }
    .hero-title .dark {
      display: block;
      color: #2f2640;
      font-weight: 620;
    }
    .hero-title .accent {
      display: block;
      margin: 2px 0 0;
      color: #8d71db;
      font-style: italic;
      font-weight: 500;
    }
    .hero-subtitle {
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.55;
      color: rgba(63,53,83,0.82);
      font-family: "Noto Serif SC", serif;
      font-weight: 500;
    }
    .hero-desc {
      margin-top: 10px;
      font-size: 10.5px;
      line-height: 1.74;
      color: rgba(98,88,120,0.72);
      max-width: 94%;
    }
    .search-bar {
      width: 100%;
      margin-top: -8px;
      position: relative;
      z-index: 3;
      padding: 12px 16px;
      gap: 9px;
      border-radius: 999px;
      background: rgba(255,255,255,0.92);
      border: 1px solid rgba(255,255,255,0.86);
      box-shadow: 0 8px 18px rgba(154, 128, 198, 0.08);
    }
    .search-icon {
      color: #b0a6c5;
    }
    .search-input {
      font-size: 13px;
    }
    .search-shortcut {
      font-size: 10px;
      padding: 3px 6px;
      border-radius: 7px;
      background: rgba(140, 119, 201, 0.06);
      color: #b1a6c5;
    }
    .section-list {
      gap: 14px;
      margin-top: 14px;
      padding: 0 2px 8px;
      position: relative;
    }
    .section-list::before {
      content: '';
      position: absolute;
      top: 18px;
      bottom: 30px;
      left: 50%;
      width: 168px;
      transform: translateX(-50%);
      background: linear-gradient(180deg, rgba(195,177,233,0.12) 0%, rgba(195,177,233,0.04) 34%, rgba(195,177,233,0.10) 68%, rgba(195,177,233,0.02) 100%);
      filter: blur(24px);
      pointer-events: none;
      z-index: 0;
    }
    .section-block {
      position: relative;
      z-index: 1;
      gap: 8px;
    }
    .section-row,
    .section-head {
      width: 100%;
    }
    .section-head {
      justify-content: flex-start;
      align-items: center;
      gap: 7px;
      padding: 0 4px 6px;
      min-height: 24px;
    }
    .section-arrow {
      width: 16px;
      height: 16px;
      background: transparent;
      box-shadow: none;
      border-radius: 0;
      color: #978daf;
    }
    .section-title {
      font-size: 16px;
      font-weight: 650;
      color: #3a3150;
    }
    .section-subtitle {
      font-size: 11px;
      color: #a79dba;

function mergeCategoryIcons(savedCategories) {
  return savedCategories.map((category) => {
    const sourceCategory = RAW_CATEGORIES.find((item) => item.id === category.id);
    if (!sourceCategory) return category;

    return {
      ...category,
      title: sourceCategory.title || category.title,
      subtitle: sourceCategory.subtitle || category.subtitle,
      navLabel: sourceCategory.navLabel || category.navLabel,
      links: category.links.map((link) => {
        const sourceLink = sourceCategory.links.find((item) => item.id === link.id);
        if (!sourceLink) return link;
        return {
          ...link,
          icon: link.icon || sourceLink.icon || '',
        };
      }),
    };
  });
}

function useToasts() {
  const [toasts, setToasts] = React.useState([]);
  const push = React.useCallback((title, text) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, title, text }]);
    window.setTimeout(() => {
      setToasts((prev) => prev.filter((item) => item.id !== id));
    }, 2200);
  }, []);
  return { toasts, push };
}

function getFavicon(link) {
  if (link.icon) return link.icon;
  if (!link.href || link.href === '#') return '';
  try {
    const url = new URL(link.href.startsWith('http') ? link.href : `https://${link.href}`);
    return `https://www.google.com/s2/favicons?domain=${url.hostname}&sz=128`;
  } catch {
    return '';
  }
}

  return (

function App() {
  const { toasts, push } = useToasts();
  const [query, setQuery] = React.useState('');
  const [activeMenu, setActiveMenu] = React.useState('home');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [collapsedSections, setCollapsedSections] = React.useState({});
  const [customCategories, setCustomCategories] = React.useState(() => {
    try {
      const saved = localStorage.getItem('anomaly-custom-categories');
      return saved ? mergeCategoryIcons(JSON.parse(saved)) : RAW_CATEGORIES;
    } catch {
      return RAW_CATEGORIES;
    }
  });
  const [backgroundImage, setBackgroundImage] = React.useState(() => {
    try {
      return localStorage.getItem('anomaly-custom-background') || '';
    } catch {
      return '';
    }
  });

  React.useEffect(() => {
    const onKeyDown = (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        const input = document.getElementById('search-input');
        if (input) input.focus();
      }
    };
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  React.useEffect(() => {
    try {
      localStorage.setItem('anomaly-custom-categories', JSON.stringify(customCategories));
    } catch {}
  }, [customCategories]);

  React.useEffect(() => {
    try {
      if (backgroundImage) localStorage.setItem('anomaly-custom-background', backgroundImage);
      else localStorage.removeItem('anomaly-custom-background');
    } catch {}
  }, [backgroundImage]);

  React.useEffect(() => {
    document.body.style.background = backgroundImage
      ? `url(${backgroundImage}) center top / cover no-repeat fixed`
      : '';
    if (!backgroundImage) document.body.style.removeProperty('background');
    return () => document.body.style.removeProperty('background');
  }, [backgroundImage]);

  const normalizedQuery = query.trim().toLowerCase();

  const displayCategories = React.useMemo(() => {
    const filtered = customCategories.map((category) => ({
      ...category,
      links: category.links.filter((link) => {
        if (!normalizedQuery) return true;
        const haystack = [link.title, link.subtitle, link.desc, category.title, category.subtitle].join(' ').toLowerCase();
        return haystack.includes(normalizedQuery);
      }),
    })).filter((category) => category.links.length > 0);

    if (activeMenu === 'home' || activeMenu === 'settings') return filtered;
    if (activeMenu === 'collection') return filtered.filter((category) => category.id === 'ai' || category.id === 'games');
    return filtered.filter((category) => category.id === activeMenu);
  }, [normalizedQuery, activeMenu, customCategories]);

  const openLink = React.useCallback((link) => {
    if (!link.href || link.href === '#') {
      push(link.title, '入口还在留白，等你以后慢慢点亮。');
      return;
    }
    window.open(link.href, '_blank', 'noopener,noreferrer');
    push(link.title, '已在新窗口打开。');
  }, [push]);

  const handleBackgroundUpload = (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      setBackgroundImage(reader.result);
      push('背景图已更新', '你现在可以自己慢慢试喜欢的版本。');
    };
    reader.readAsDataURL(file);
  };

  const handleBackgroundReset = () => {
    setBackgroundImage('');
    push('背景已恢复', '又回到默认的底色了。');
  };

  const handleAddCategory = (newCategory) => {
    setCustomCategories((prev) => prev.some((cat) => cat.id === newCategory.id) ? prev : [...prev, newCategory]);
  };

  const handleAddLink = (catId, newLink) => {
    setCustomCategories((prev) => prev.map((cat) => cat.id === catId ? { ...cat, links: [...cat.links, newLink] } : cat));
    push('新入口已放好', `我把 ${newLink.title} 塞进去了。`);
  };

  return (
    <>
      <div className="app-shell">
        <aside className="sidebar">
          <div className="brand-wrap">
            <div className="brand-top">
              <div className="avatar-orb" />
              <div>
                <div className="brand-title">ANOMALY GATE</div>
                <div className="brand-stars">✦ ✦ ✦</div>
              </div>
            </div>

            <nav className="menu">
              {MENU_ITEMS.map((item) => (
                <button
                  key={item.id}
                  className={['menu-item', activeMenu === item.id ? 'active' : ''].join(' ')}
                  onClick={() => {
                    if (item.id === 'settings') {
                      setSettingsOpen((v) => !v);
                      setActiveMenu('home');
                    } else {
                      setActiveMenu(item.id);
                    }
                  }}
                >
                  <span className="menu-emoji"><MenuIcon type={item.icon} /></span>
                  <span className="menu-label">{item.label}</span>
                </button>
              ))}
            </nav>
          </div>

        </aside>

        <main className="main">
          <div className="mobile-topbar">
            <button className="mobile-menu-btn" onClick={() => setSettingsOpen((v) => !v)} aria-label="打开菜单">
              <MenuIcon type="settings" />
            </button>
          </div>
          <section className="hero">
            <div className="hero-copy">
              <div className="eyebrow">Memory console · all portals</div>
              <h1 className="hero-title">
                <span className="dark">Anomaly</span>
                <span className="accent">Gate</span>
              </h1>
              <div className="hero-subtitle">Avenil 与纤凝的共享记忆账组</div>
              <div className="hero-desc">✦ 所有被留下的事，都从这里重新发光。</div>
            </div>

            <label className="search-bar" htmlFor="search-input">
              <span className="search-icon"><SearchIcon /></span>
              <input
                id="search-input"
                className="search-input"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="搜索 portal、记忆、工作台……"
              />
              <span className="search-shortcut">⌘K</span>
            </label>
          </section>

          <section className="section-list view-stage" key={activeMenu + ':' + normalizedQuery}>
            {displayCategories.length ? displayCategories.map((category) => (
              <section className="section-block" key={category.id}>
                <div className="section-row">
                  <button
                    className="section-head"
                    type="button"
                    onClick={() => setCollapsedSections((prev) => ({ ...prev, [category.id]: !prev[category.id] }))}
                  >
                    <span className={['section-arrow', collapsedSections[category.id] ? 'collapsed' : ''].join(' ')}><ChevronDownIcon /></span>
                    <div className="section-title">{category.title} <span className="section-subtitle">/ {category.subtitle}</span></div>
                  </button>
                  {category.id === displayCategories[0]?.id ? (
                    <button
                      type="button"
                      className="section-toggle-all"
                      onClick={() => {
                        const shouldCollapseAll = displayCategories.some((item) => !collapsedSections[item.id]);
                        const nextState = {};
                        displayCategories.forEach((item) => {
                          nextState[item.id] = shouldCollapseAll;
                        });
                        setCollapsedSections((prev) => ({ ...prev, ...nextState }));
                      }}
                    >
                      {displayCategories.every((item) => collapsedSections[item.id]) ? '全部展开' : '全部折叠'}
                    </button>
                  ) : null}
                </div>
                <div className={['section-content', collapsedSections[category.id] ? 'collapsed' : ''].join(' ')}>
                  <div className="section-content-inner">
                    <div className="card-grid">
                      {category.links.map((link) => (
                        <PortalCard key={link.id} link={link} onOpen={openLink} />
                      ))}
                    </div>
                  </div>
                </div>
              </section>
            )) : (
              <div className="empty-state">没有搜到对应入口，换个词试试，或者回到首页看看。</div>
            )}
          </section>
        </main>
      </div>

      <SettingsPanel
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        backgroundImage={backgroundImage}
        onBackgroundUpload={handleBackgroundUpload}
        onBackgroundReset={handleBackgroundReset}
        categories={customCategories}
        onAddLink={handleAddLink}
        onAddCategory={handleAddCategory}
      />

      <div className="toast-stack">
        {toasts.map((toast) => (
          <div className="toast" key={toast.id}>
            <div className="toast-title">{toast.title}</div>
            <div className="toast-text">{toast.text}</div>
          </div>
        ))}
      </div>

      <nav className="mobile-bottom-nav">
        {MENU_ITEMS.map((item) => (
          <button
            key={item.id}
            className={['mobile-nav-item', activeMenu === item.id || (item.id === 'home' && activeMenu === 'settings') ? 'active' : ''].join(' ')}
            onClick={() => {
              if (item.id === 'settings') {
                setSettingsOpen((v) => !v);
                setActiveMenu('home');
              } else {
                setActiveMenu(item.id);
              }
            }}
          >
            <span className="mobile-nav-icon"><MenuIcon type={item.icon} /></span>
            <span>{item.label}</span>
          </button>
        ))}
      </nav>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
