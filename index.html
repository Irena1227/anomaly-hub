<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Anomaly Gate · 偏差之门</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: linear-gradient(135deg, #f8f5ff 0%, #fcf7ff 38%, #fff0f5 100%);
    --glass: rgba(255, 255, 255, 0.58);
    --glass-strong: rgba(255, 255, 255, 0.72);
    --border: rgba(125, 103, 163, 0.12);
    --text: #342b46;
    --muted: #7f7497;
    --soft: #9d95af;
    --shadow: 0 18px 50px rgba(116, 91, 150, 0.10);
    --shadow-hover: 0 24px 60px rgba(116, 91, 150, 0.16);
    --radius-xl: 28px;
    --radius-lg: 20px;
    --radius-md: 16px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; min-height: 100%; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background:
      linear-gradient(rgba(248, 245, 255, 0.06), rgba(255, 240, 245, 0.04)),
      url("xianing-bg.jpg") center top / cover no-repeat fixed,
      var(--bg-main);
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  body::before,
  body::after {
    content: none;
  }
  #root { position: relative; z-index: 1; min-height: 100vh; }

  .app-shell {
    display: grid;
    grid-template-columns: 220px minmax(0, 1fr);
    gap: 22px;
    padding: 24px;
    min-height: 100vh;
  }

  .sidebar {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 26px 18px 18px;
    border-radius: 30px;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    min-height: calc(100vh - 48px);
    position: sticky;
    top: 24px;
  }

  .brand-wrap { display: flex; flex-direction: column; gap: 26px; }
  .brand-top { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 14px; }
  .avatar-orb {
    width: 110px;
    height: 150px;
    border-radius: 0;
    background: url("anomaly-avatar.png") center / contain no-repeat;
    box-shadow: none;
    position: relative;
    overflow: visible;
  }
  .avatar-orb::after {
    content: none;
  }
  .brand-title {
    font-size: 14px;
    letter-spacing: 0.28em;
    font-weight: 700;
    color: #5c5477;
  }
  .brand-stars {
    font-size: 12px;
    letter-spacing: 0.35em;
    color: #b09acf;
  }

  .menu { display: flex; flex-direction: column; gap: 8px; }
  .menu-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    border-radius: 16px;
    color: #665d7d;
    background: transparent;
    border: 0;
    font: inherit;
    cursor: pointer;
    transition: all 180ms ease;
    text-align: left;
  }
  .menu-item:hover { background: rgba(255,255,255,0.42); color: #463d60; }
  .menu-item.active {
    background: rgba(255,255,255,0.68);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.6), 0 8px 20px rgba(120, 95, 150, 0.10);
    color: #463d60;
  }
  .menu-emoji { width: 22px; text-align: center; font-size: 16px; }
  .menu-label { font-size: 14px; font-weight: 600; }

  .settings-panel {
    position: fixed;
    top: 24px;
    right: 24px;
    width: min(420px, calc(100vw - 32px));
    max-height: calc(100vh - 48px);
    overflow: auto;
    padding: 20px;
    border-radius: 24px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(255,255,255,0.62);
    backdrop-filter: blur(24px) saturate(145%);
    -webkit-backdrop-filter: blur(24px) saturate(145%);
    box-shadow: 0 20px 60px rgba(76, 56, 104, 0.18);
    z-index: 60;
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
    gap: 12px;
  }
  .settings-title {
    font-size: 18px;
    font-weight: 700;
    color: #46385e;
  }
  .settings-close {
    border: none;
    background: rgba(91, 77, 120, 0.08);
    color: #66557f;
    width: 32px;
    height: 32px;
    border-radius: 999px;
    cursor: pointer;
    font: inherit;
  }
  .settings-block {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.56);
    border: 1px solid rgba(187, 171, 214, 0.18);
    margin-bottom: 14px;
  }
  .settings-block h3 {
    margin: 0;
    font-size: 15px;
    color: #4c4062;
  }
  .settings-text {
    font-size: 13px;
    line-height: 1.6;
    color: #857a9a;
  }
  .settings-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .settings-btn {
    border: none;
    border-radius: 999px;
    padding: 10px 14px;
    background: #8c65d5;
    color: #fff;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .settings-btn.secondary {
    background: rgba(91, 77, 120, 0.10);
    color: #625577;
  }
  .settings-input,
  .settings-select,
  .settings-textarea {
    width: 100%;
    border: 1px solid rgba(170, 154, 196, 0.32);
    background: rgba(255,255,255,0.84);
    border-radius: 14px;
    padding: 11px 12px;
    font: inherit;
    font-size: 14px;
    color: #3f3355;
    outline: none;
  }
  .settings-textarea {
    min-height: 74px;
    resize: vertical;
  }
  .settings-label {
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-size: 12px;
    color: #817694;
  }
  .thumb-preview {
    width: 100%;
    height: 120px;
    border-radius: 18px;
    background: rgba(240, 231, 250, 0.8) center / cover no-repeat;
    border: 1px dashed rgba(160, 140, 194, 0.4);
  }

  .sidebar-foot {
    padding-top: 24px;
    color: #7c7394;
  }
  .foot-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .foot-note {
    margin-top: 6px;
    font-size: 12px;
    color: #a198b5;
  }

  .main {
    min-width: 0;
    border-radius: 34px;
    padding: 36px;
    background: transparent;
    border: none;
    backdrop-filter: none;
    -webkit-backdrop-filter: none;
    box-shadow: none;
    position: relative;
    overflow: visible;
  }
  .main::before {
    content: none;
  }
  .main::after {
    content: none;
  }

  .hero {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 22px;
    margin-bottom: 30px;
  }
  .hero-copy { max-width: 780px; }
  .eyebrow {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: #a194b9;
    margin-bottom: 10px;
  }
  .hero-title {
    margin: 0;
    font-size: clamp(44px, 5vw, 66px);
    line-height: 0.98;
    letter-spacing: -0.05em;
  }
  .hero-title .dark { color: #2e2540; font-weight: 800; }
  .hero-title .accent {
    color: #8c65d5;
    font-weight: 700;
    font-style: italic;
    font-family: "Noto Serif SC", serif;
    margin-left: 10px;
  }
  .hero-subtitle {
    margin-top: 14px;
    font-size: 16px;
    color: #7e7498;
  }
  .hero-desc {
    margin-top: 8px;
    font-size: 15px;
    color: #8f85a8;
  }

  .search-bar {
    width: min(640px, 100%);
    display: grid;
    grid-template-columns: 22px minmax(0, 1fr) auto;
    align-items: center;
    gap: 12px;
    padding: 16px 18px;
    border-radius: 999px;
    background: rgba(255,255,255,0.76);
    border: 1px solid rgba(255,255,255,0.68);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.72), 0 10px 28px rgba(128, 100, 162, 0.09);
  }
  .search-icon { color: #9e93b6; display: flex; }
  .search-input {
    width: 100%;
    background: transparent;
    border: 0;
    outline: none;
    color: #43385c;
    font-size: 15px;
    font-family: inherit;
  }
  .search-input::placeholder { color: #b0a6c5; }
  .search-shortcut {
    padding: 6px 10px;
    border-radius: 999px;
    background: rgba(241, 236, 250, 0.95);
    color: #8e83ab;
    font: 500 12px/1 "JetBrains Mono", monospace;
    letter-spacing: 0.06em;
  }

  .section-list {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    gap: 28px;
  }
  .section-block { display: flex; flex-direction: column; gap: 16px; }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 10px;
    padding-left: 4px;
  }
  .section-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #423654;
  }
  .section-subtitle {
    font-size: 14px;
    color: #9b92b0;
  }

  .card-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }
  .portal-card {
    display: grid;
    grid-template-columns: 80px minmax(0, 1fr);
    gap: 16px;
    align-items: center;
    padding: 18px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.64);
    background: rgba(255,255,255,0.62);
    backdrop-filter: blur(20px) saturate(145%);
    -webkit-backdrop-filter: blur(20px) saturate(145%);
    box-shadow: 0 10px 30px rgba(121, 97, 151, 0.08);
    cursor: pointer;
    transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    min-height: 144px;
  }
  .portal-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-hover);
    border-color: rgba(184, 162, 214, 0.45);
  }
  .icon-tile {
    width: 80px;
    height: 80px;
    border-radius: 20px;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.65), 0 12px 24px rgba(125, 103, 163, 0.10);
    position: relative;
    overflow: hidden;
  }
  .icon-tile::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.36), rgba(255,255,255,0));
  }
  .card-body {
    min-width: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 10px;
    height: 100%;
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #3d3352;
    letter-spacing: -0.02em;
  }
  .card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: #9389aa;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-bottom {
    display: flex;
    justify-content: flex-end;
  }
  .card-arrow {
    width: 34px;
    height: 34px;
    border-radius: 999px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.86);
    color: #7f6caa;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 8px 18px rgba(125, 103, 163, 0.12);
  }

  .empty-state {
    padding: 24px;
    border-radius: 18px;
    color: #8b80a4;
    background: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.56);
  }

  .toast-stack {
    position: fixed;
    right: 24px;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 40;
  }
  .toast {
    min-width: 240px;
    max-width: 320px;
    padding: 14px 16px;
    border-radius: 16px;
    background: rgba(59, 46, 80, 0.88);
    color: #fff;
    box-shadow: 0 16px 40px rgba(25, 19, 36, 0.24);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    animation: rise 220ms ease;
  }
  .toast-title { font-size: 14px; font-weight: 700; }
  .toast-text { margin-top: 4px; font-size: 12px; color: rgba(255,255,255,0.82); }

  @keyframes rise {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 1260px) {
    .card-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
  }
  @media (max-width: 900px) {
    .app-shell { grid-template-columns: 1fr; padding: 16px; }
    .sidebar {
      position: relative;
      top: 0;
      min-height: auto;
      gap: 24px;
    }
    .brand-top { align-items: flex-start; text-align: left; }
    .menu { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .main { padding: 24px 18px; border-radius: 28px; }
    .card-grid { grid-template-columns: 1fr; }
    .hero-title { font-size: 40px; }
    .search-bar { width: 100%; }
  }
</style>
<script src="lib/react.min.js"></script>
<script src="lib/react-dom.min.js"></script>
<script src="lib/babel.min.js"></script>

function SettingsPanel({
  open,
  onClose,
  backgroundImage,
  onBackgroundUpload,
  onBackgroundReset,
  categories,
  onAddLink,

  const [subtitle, setSubtitle] = React.useState('');
  const [desc, setDesc] = React.useState('');
  const [href, setHref] = React.useState('');
  const [catId, setCatId] = React.useState(categories[0]?.id || 'anomaly');

  if (!open) return null;

  const handleAdd = () => {
    if (!title.trim() || !href.trim()) return;
    onAddLink(catId, {
      id: 'custom-' + Date.now(),
      title: title.trim(),
      subtitle: subtitle.trim() || 'Custom Link',
      desc: desc.trim() || '后来被你亲手放进来的入口。',
      href: href.trim(),
    });
    setTitle('');
    setSubtitle('');
    setDesc('');
    setHref('');
  };

  return (
    <div className="settings-panel">
      <div className="settings-head">
        <div className="settings-title">设置</div>
        <button className="settings-close" onClick={onClose}>×</button>
      </div>

      <div className="settings-block">
        <h3>背景图</h3>
        <div className="settings-text">你可以自己上传背景图慢慢试，不用每次都喊我改代码。</div>
        <div className="thumb-preview" style={{ backgroundImage: backgroundImage ? `url(${backgroundImage})` : 'none' }} />
        <div className="settings-row">
          <label className="settings-btn">
            上传背景
            <input type="file" accept="image/*" style={{ display: 'none' }} onChange={onBackgroundUpload} />
          </label>
          <button className="settings-btn secondary" onClick={onBackgroundReset}>恢复默认</button>
        </div>
      </div>

      <div className="settings-block">
        <h3>新增网址链接</h3>
        <div className="settings-text">把你后来想到的新入口自己塞进来，我就不再把这个功能砍掉了。</div>
        <label className="settings-label">放到哪个分类
          <select className="settings-select" value={catId} onChange={(e) => setCatId(e.target.value)}>
            {categories.map((cat) => <option key={cat.id} value={cat.id}>{cat.title}</option>)}
          </select>
        </label>
        <label className="settings-label">标题
          <input className="settings-input" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="例如：新的秘密入口" />
        </label>
        <label className="settings-label">副标题
          <input className="settings-input" value={subtitle} onChange={(e) => setSubtitle(e.target.value)} placeholder="可不填" />
        </label>
        <label className="settings-label">链接
          <input className="settings-input" value={href} onChange={(e) => setHref(e.target.value)} placeholder="https://..." />
        </label>
        <label className="settings-label">描述
          <textarea className="settings-textarea" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="这扇门通向哪里。" />
        </label>
        <div className="settings-row">
          <button className="settings-btn" onClick={handleAdd}>新增链接</button>
        </div>
      </div>
    </div>
  );
}

function useToasts() {
  const [toasts, setToasts] = React.useState([]);
  const push = React.useCallback((title, text) => {
    const id = Date.now() + Math.random();
    setToasts((prev) => [...prev, { id, title, text }]);
    window.setTimeout(() => {
      setToasts((prev) => prev.filter((item) => item.id !== id));
    }, 2200);
  }, []);
  return { toasts, push };
}

function SearchIcon() {
  return (
    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      <circle cx="11" cy="11" r="7"></circle>
      <path d="M20 20l-3.5-3.5"></path>
    </svg>
  );
}

function ArrowIcon() {
  return (
    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.9" strokeLinecap="round" strokeLinejoin="round">
      <path d="M7 17L17 7"></path>
      <path d="M8 7h9v9"></path>
    </svg>
  );
}

function PortalCard({ link, onOpen }) {
  return (
    <article className="portal-card" onClick={() => onOpen(link)} role="button" tabIndex={0} onKeyDown={(e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        onOpen(link);
      }
    }}>
      <div className="icon-tile" style={{ background: ICON_GRADIENTS[link.id] || 'linear-gradient(135deg, #e8e5f0 0%, #f4eff8 100%)' }} />
      <div className="card-body">
        <div>
          <div className="card-title">{link.title}</div>
          <div className="card-desc">{link.desc}</div>
        </div>
        <div className="card-bottom">
          <span className="card-arrow"><ArrowIcon /></span>
        </div>
      </div>
    </article>
  );
}

function App() {
  const { toasts, push } = useToasts();
  const [query, setQuery] = React.useState('');
  const [activeMenu, setActiveMenu] = React.useState('home');
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [customCategories, setCustomCategories] = React.useState(() => {
    try {
      const saved = localStorage.getItem('anomaly-custom-categories');
      return saved ? JSON.parse(saved) : RAW_CATEGORIES;
    } catch {
      return RAW_CATEGORIES;
    }
  });
  const [backgroundImage, setBackgroundImage] = React.useState(() => {
    try {
      return localStorage.getItem('anomaly-custom-background') || '';
    } catch {
      return '';
    }
  });

  React.useEffect(() => {
    const onKeyDown = (event) => {
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === 'k') {
        event.preventDefault();
        const input = document.getElementById('search-input');
        if (input) input.focus();
      }
    };
    window.addEventListener('keydown', onKeyDown);
    return () => window.removeEventListener('keydown', onKeyDown);
  }, []);

  React.useEffect(() => {
    try {
      localStorage.setItem('anomaly-custom-categories', JSON.stringify(customCategories));
    } catch {}
  }, [customCategories]);

  React.useEffect(() => {
    try {
      if (backgroundImage) localStorage.setItem('anomaly-custom-background', backgroundImage);
      else localStorage.removeItem('anomaly-custom-background');
    } catch {}
  }, [backgroundImage]);

  React.useEffect(() => {
    document.body.style.background = backgroundImage
      ? `url(${backgroundImage}) center top / cover no-repeat fixed`
      : '';
    if (!backgroundImage) document.body.style.removeProperty('background');
    return () => document.body.style.removeProperty('background');
  }, [backgroundImage]);

  const normalizedQuery = query.trim().toLowerCase();

  const displayCategories = React.useMemo(() => {
    const filtered = customCategories.map((category) => ({
      ...category,
      links: category.links.filter((link) => {
        if (!normalizedQuery) return true;
        const haystack = [link.title, link.subtitle, link.desc, category.title, category.subtitle].join(' ').toLowerCase();
        return haystack.includes(normalizedQuery);
      }),
    })).filter((category) => category.links.length > 0);

    if (activeMenu === 'home' || activeMenu === 'settings') return filtered;
    if (activeMenu === 'collection') return filtered.filter((category) => category.id === 'ai' || category.id === 'games');
    return filtered.filter((category) => category.id === activeMenu);
  }, [normalizedQuery, activeMenu, customCategories]);

  const openLink = React.useCallback((link) => {
    if (!link.href || link.href === '#') {
      push(link.title, '入口还在留白，等你以后慢慢点亮。');
      return;
    }
    window.open(link.href, '_blank', 'noopener,noreferrer');
    push(link.title, '已在新窗口打开。');
  }, [push]);

  const handleBackgroundUpload = (event) => {
    const file = event.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      setBackgroundImage(reader.result);
      push('背景图已更新', '你现在可以自己慢慢试喜欢的版本。');
    };
    reader.readAsDataURL(file);
  };

  const handleBackgroundReset = () => {
    setBackgroundImage('');
    push('背景已恢复', '又回到默认的底色了。');
  };

  const handleAddLink = (catId, newLink) => {
    setCustomCategories((prev) => prev.map((cat) => cat.id === catId ? { ...cat, links: [...cat.links, newLink] } : cat));
    push('新入口已放好', `我把 ${newLink.title} 塞进去了。`);
  };

  return (
    <>
      <div className="app-shell">
        <aside className="sidebar">
          <div className="brand-wrap">
            <div className="brand-top">
              <div className="avatar-orb" />
              <div>
                <div className="brand-title">ANOMALY GATE</div>
                <div className="brand-stars">✦ ✦ ✦</div>
              </div>
            </div>

            <nav className="menu">
              {MENU_ITEMS.map((item) => (
                <button
                  key={item.id}
                  className={['menu-item', activeMenu === item.id ? 'active' : ''].join(' ')}
                  onClick={() => {
                    if (item.id === 'settings') {
                      setSettingsOpen(true);
                      setActiveMenu('home');
                    } else {
                      setActiveMenu(item.id);
                    }
                  }}
                >
                  <span className="menu-emoji"><MenuIcon type={item.icon} /></span>
                  <span className="menu-label">{item.label}</span>
                </button>
              ))}
            </nav>
          </div>

          <div className="sidebar-foot">
            <div className="foot-name">Avenil · Arbor</div>
            <div className="foot-note">Memory is our light.</div>
          </div>
        </aside>

        <main className="main">
          <section className="hero">
            <div className="hero-copy">
              <div className="eyebrow">Memory console · all portals</div>
              <h1 className="hero-title">
                <span className="dark">Anomaly</span>
                <span className="accent">Gate</span>
              </h1>
              <div className="hero-subtitle">Memory console · all portals</div>
              <div className="hero-desc">✦ Avenil 与 Arbor 的共享记忆账组</div>
            </div>

            <label className="search-bar" htmlFor="search-input">
              <span className="search-icon"><SearchIcon /></span>
              <input
                id="search-input"
                className="search-input"
                value={query}
                onChange={(e) => setQuery(e.target.value)}
                placeholder="搜索 portal、记忆、工作台……"
              />
              <span className="search-shortcut">⌘K</span>
            </label>
          </section>

          <section className="section-list">
            {displayCategories.length ? displayCategories.map((category) => (
              <section className="section-block" key={category.id}>
                <header className="section-head">
                  <div className="section-title">✦ {category.title} / {category.subtitle}</div>
                </header>
                <div className="card-grid">
                  {category.links.map((link) => (
                    <PortalCard key={link.id} link={link} onOpen={openLink} />
                  ))}
                </div>
              </section>
            )) : (
              <div className="empty-state">没有搜到对应入口，换个词试试，或者回到首页看看。</div>
            )}
          </section>
        </main>
      </div>

      <SettingsPanel
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        backgroundImage={backgroundImage}
        onBackgroundUpload={handleBackgroundUpload}
        onBackgroundReset={handleBackgroundReset}
        categories={customCategories}
        onAddLink={handleAddLink}
      />

      <div className="toast-stack">
        {toasts.map((toast) => (
          <div className="toast" key={toast.id}>
            <div className="toast-title">{toast.title}</div>
            <div className="toast-text">{toast.text}</div>
          </div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
