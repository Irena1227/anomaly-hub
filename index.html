<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Anomaly Gate · 偏差之门</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --purple: #7c5ecf;
    --purple-light: #a78bfa;
    --purple-dark: #5b3fa0;
    --bg: #f3eef9;
    --card-bg: rgba(255,255,255,0.7);
    --card-border: rgba(255,255,255,0.6);
    --text: #2e2540;
    --text-muted: #7f7497;
    --text-soft: #a097b5;
    --shadow-card: 0 2px 12px rgba(124,94,207,0.08);
    --radius: 16px;
    --tab-height: 64px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    color: var(--text);
    background: linear-gradient(160deg, #ede5f7 0%, #f5f0fc 30%, #f8f4ff 60%, #fdf0f5 100%);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }

  /* Desktop: center the mobile layout */
  #root {
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    position: relative;
    background: var(--bg);
    box-shadow: 0 0 60px rgba(124,94,207,0.08);
  }

  @media (max-width: 480px) {
    #root {
      max-width: 100%;
      box-shadow: none;
    }
  }

  /* ── Hero ── */
  .hero {
    position: relative;
    height: 260px;
    background: linear-gradient(135deg, #c4b5e0 0%, #a78bfa 30%, #9f7aea 50%, #d8b4fe 80%, #ede5f7 100%);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 28px;
  }
  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 30%, rgba(255,255,255,0.3) 0%, transparent 50%),
      radial-gradient(circle at 80% 60%, rgba(255,255,255,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 80%, rgba(216,180,254,0.4) 0%, transparent 50%);
    pointer-events: none;
  }
  .hero::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(1.5px 1.5px at 15% 25%, rgba(255,255,255,0.7) 50%, transparent 50%),
      radial-gradient(1px 1px at 40% 15%, rgba(255,255,255,0.5) 50%, transparent 50%),
      radial-gradient(1.5px 1.5px at 65% 35%, rgba(255,255,255,0.6) 50%, transparent 50%),
      radial-gradient(1px 1px at 80% 20%, rgba(255,255,255,0.4) 50%, transparent 50%),
      radial-gradient(2px 2px at 25% 70%, rgba(255,255,255,0.5) 50%, transparent 50%),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.6) 50%, transparent 50%),
      radial-gradient(1.5px 1.5px at 90% 45%, rgba(255,255,255,0.5) 50%, transparent 50%),
      radial-gradient(1px 1px at 10% 85%, rgba(255,255,255,0.4) 50%, transparent 50%),
      radial-gradient(2px 2px at 70% 75%, rgba(255,255,255,0.35) 50%, transparent 50%),
      radial-gradient(1px 1px at 35% 90%, rgba(255,255,255,0.3) 50%, transparent 50%);
    animation: sparkle 4s ease-in-out infinite alternate;
    pointer-events: none;
  }
  @keyframes sparkle {
    0% { opacity: 0.6; }
    50% { opacity: 1; }
    100% { opacity: 0.5; }
  }

  .hero-hamburger {
    position: absolute;
    top: 16px;
    left: 18px;
    width: 36px;
    height: 36px;
    border: none;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    cursor: pointer;
    z-index: 5;
  }
  .hero-hamburger span {
    display: block;
    width: 18px;
    height: 2px;
    background: rgba(255,255,255,0.9);
    border-radius: 1px;
  }

  .hero-content {
    position: relative;
    z-index: 2;
  }
  .hero-title {
    font-family: "Caveat", "Noto Serif SC", cursive, serif;
    font-size: 42px;
    font-weight: 700;
    color: #fff;
    line-height: 1.1;
    text-shadow: 0 2px 12px rgba(91,63,160,0.25);
    margin-bottom: 10px;
  }
  .hero-sub {
    font-family: "Noto Serif SC", serif;
    font-size: 15px;
    color: rgba(255,255,255,0.92);
    font-weight: 400;
    line-height: 1.6;
    text-shadow: 0 1px 6px rgba(91,63,160,0.15);
  }
  .hero-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    margin-top: 6px;
    font-weight: 400;
  }

  /* ── Search ── */
  .search-wrap {
    padding: 0 18px;
    margin-top: -22px;
    position: relative;
    z-index: 10;
  }
  .search-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 16px;
    border-radius: 999px;
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(16px) saturate(140%);
    -webkit-backdrop-filter: blur(16px) saturate(140%);
    border: 1px solid rgba(255,255,255,0.7);
    box-shadow: 0 4px 20px rgba(124,94,207,0.1), inset 0 1px 0 rgba(255,255,255,0.8);
  }
  .search-icon { color: var(--text-soft); display: flex; flex-shrink: 0; }
  .search-input {
    flex: 1;
    border: none;
    background: transparent;
    outline: none;
    font: inherit;
    font-size: 14px;
    color: var(--text);
  }
  .search-input::placeholder { color: #b8aed0; }
  .search-shortcut {
    flex-shrink: 0;
    padding: 4px 8px;
    border-radius: 6px;
    background: rgba(124,94,207,0.08);
    color: var(--text-muted);
    font: 500 11px/1 "JetBrains Mono", monospace;
  }

  /* ── Content ── */
  .content-area {
    padding: 20px 18px;
    padding-bottom: calc(var(--tab-height) + 60px);
  }

  /* ── Section ── */
  .section-block {
    margin-bottom: 22px;
  }
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 12px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .section-title-group {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--purple);
    flex-shrink: 0;
  }
  .section-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
  }
  .section-subtitle {
    font-size: 12px;
    color: var(--text-soft);
    margin-left: 4px;
  }
  .section-toggle {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    border: none;
    background: rgba(124,94,207,0.06);
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: transform 200ms ease;
    flex-shrink: 0;
  }
  .section-toggle.collapsed {
    transform: rotate(-90deg);
  }

  /* ── Cards ── */
  .card-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    overflow: hidden;
    transition: max-height 300ms ease, opacity 200ms ease;
  }
  .card-list.collapsed {
    max-height: 0 !important;
    opacity: 0;
    pointer-events: none;
  }

  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 14px;
    border-radius: var(--radius);
    background: var(--card-bg);
    backdrop-filter: blur(12px) saturate(130%);
    -webkit-backdrop-filter: blur(12px) saturate(130%);
    border: 1px solid var(--card-border);
    box-shadow: var(--shadow-card);
    cursor: pointer;
    transition: transform 160ms ease, box-shadow 160ms ease;
    text-decoration: none;
    color: inherit;
  }
  .link-card:active {
    transform: scale(0.98);
  }
  .link-card:hover {
    box-shadow: 0 4px 20px rgba(124,94,207,0.14);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    overflow: hidden;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 2px 6px rgba(124,94,207,0.08);
    position: relative;
  }
  .card-icon img {
    width: 28px;
    height: 28px;
    object-fit: contain;
  }
  .card-icon .glyph {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .card-info {
    flex: 1;
    min-width: 0;
  }
  .card-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.02em;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    margin-top: 2px;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-arrow {
    flex-shrink: 0;
    color: var(--text-soft);
    opacity: 0.5;
  }

  /* ── Empty state ── */
  .empty-state {
    padding: 24px;
    border-radius: var(--radius);
    background: var(--card-bg);
    color: var(--text-muted);
    text-align: center;
    font-size: 14px;
  }

  /* ── Bottom quote ── */
  .bottom-quote {
    text-align: center;
    padding: 16px 18px 8px;
    font-size: 13px;
    color: var(--text-soft);
    font-family: "Noto Serif SC", serif;
  }

  /* ── Tab Bar ── */
  .tab-bar {
    position: fixed;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 100%;
    max-width: 480px;
    height: var(--tab-height);
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px) saturate(150%);
    -webkit-backdrop-filter: blur(20px) saturate(150%);
    border-top: 1px solid rgba(124,94,207,0.08);
    display: flex;
    align-items: center;
    justify-content: space-around;
    z-index: 50;
    padding-bottom: env(safe-area-inset-bottom, 0);
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 6px 0;
    border: none;
    background: transparent;
    cursor: pointer;
    color: var(--text-soft);
    transition: color 160ms ease;
    font-family: inherit;
    min-width: 52px;
  }
  .tab-item.active {
    color: var(--purple);
  }
  .tab-item .tab-icon {
    width: 24px;
    height: 24px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .tab-item .tab-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }

  /* ── Settings Panel ── */
  .settings-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    z-index: 100;
    display: flex;
    align-items: flex-end;
    justify-content: center;
  }
  .settings-panel {
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow: auto;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 24px 24px 0 0;
    padding: 20px 20px calc(20px + env(safe-area-inset-bottom, 0));
    box-shadow: 0 -10px 40px rgba(124,94,207,0.15);
    animation: slideUp 260ms cubic-bezier(0.25,0.8,0.35,1);
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .settings-head {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
  }
  .settings-title {
    font-size: 18px;
    font-weight: 700;
    color: var(--text);
  }
  .settings-close {
    width: 32px;
    height: 32px;
    border-radius: 999px;
    border: none;
    background: rgba(124,94,207,0.08);
    color: var(--text-muted);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .settings-block {
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.6);
    border: 1px solid rgba(124,94,207,0.08);
    margin-bottom: 14px;
  }
  .settings-block h3 {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .settings-text {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 12px;
  }
  .settings-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .settings-btn {
    border: none;
    border-radius: 999px;
    padding: 10px 16px;
    background: var(--purple);
    color: #fff;
    font: inherit;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .settings-btn.secondary {
    background: rgba(124,94,207,0.1);
    color: var(--text-muted);
  }
  .settings-input,
  .settings-select,
  .settings-textarea {
    width: 100%;
    border: 1px solid rgba(124,94,207,0.15);
    background: rgba(255,255,255,0.8);
    border-radius: 12px;
    padding: 11px 12px;
    font: inherit;
    font-size: 14px;
    color: var(--text);
    outline: none;
    margin-bottom: 8px;
  }
  .settings-textarea {
    min-height: 70px;
    resize: vertical;
  }
  .settings-label {
    display: flex;
    flex-direction: column;
    gap: 4px;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .thumb-preview {
    width: 100%;
    height: 100px;
    border-radius: 14px;
    background: rgba(240,231,250,0.8) center / cover no-repeat;
    border: 1px dashed rgba(124,94,207,0.25);
    margin-bottom: 12px;
  }

  /* ── Toast ── */
  .toast-container {
    position: fixed;
    bottom: calc(var(--tab-height) + 20px);
    left: 50%;
    transform: translateX(-50%);
    z-index: 80;
    pointer-events: none;
  }
  .toast {
    padding: 10px 20px;
    border-radius: 999px;
    background: rgba(46,37,64,0.88);
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    box-shadow: 0 8px 28px rgba(0,0,0,0.2);
    white-space: nowrap;
    animation: toastIn 220ms ease;
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
<script src="lib/react.min.js"></script>
<script src="lib/react-dom.min.js"></script>
<script src="lib/babel.min.js"></script>
</head>

/* ── Icons ── */
function TabIcon({ type, size = 20 }) {
  const p = { viewBox: '0 0 24 24', width: size, height: size, fill: 'none', stroke: 'currentColor', strokeWidth: '1.8', strokeLinecap: 'round', strokeLinejoin: 'round' };
  if (type === 'home') return <svg {...p}><path d="M3 10.5L12 3l9 7.5"/><path d="M6 9.5V20h12V9.5"/></svg>;
  if (type === 'sparkles') return <svg {...p}><path d="M12 4l1.9 5.1L19 11l-5.1 1.9L12 18l-1.9-5.1L5 11l5.1-1.9L12 4Z"/></svg>;
  if (type === 'star') return <svg {...p}><path d="m12 3 2.7 5.5 6.1.9-4.4 4.2 1 6-5.4-2.9-5.4 2.9 1-6-4.4-4.2 6.1-.9L12 3Z"/></svg>;
  if (type === 'gem') return <svg {...p}><path d="M7 7L10 4h4l3 3-5 13L7 7Z"/><path d="M10 4l2 3 2-3"/><path d="M7 7h10"/></svg>;
  if (type === 'settings') return <svg {...p}><circle cx="12" cy="12" r="3.2"/><path d="M12 2.8v2.1"/><path d="M12 19.1v2.1"/><path d="m4.93 4.93 1.48 1.48"/><path d="m17.59 17.59 1.48 1.48"/><path d="M2.8 12h2.1"/><path d="M19.1 12h2.1"/><path d="m4.93 19.07 1.48-1.48"/><path d="m17.59 6.41 1.48-1.48"/></svg>;
  return <svg {...p}><circle cx="12" cy="12" r="3"/></svg>;
}

function SearchIcon() {
  return <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3.5-3.5"/></svg>;
}

function ChevronIcon() {
  return <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
}

function ArrowRightIcon() {
  return <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 18l6-6-6-6"/></svg>;
}

/* ── Helpers ── */
function getFaviconUrl(link) {
  if (link.favicon) return link.favicon;
  if (link.href && link.href.startsWith('http')) {
    try {
      const domain = new URL(link.href).hostname;
      return 'https://www.google.com/s2/favicons?domain=' + domain + '&sz=128';
    } catch(e) {}
  }
  return null;
}

/* ── Toast Hook ── */
function useToast() {
  const [toast, setToast] = React.useState(null);
  const timerRef = React.useRef(null);
  const show = React.useCallback((msg) => {
    clearTimeout(timerRef.current);
    setToast(msg);
    timerRef.current = setTimeout(() => setToast(null), 1800);
  }, []);
  return { toast, show };
}

/* ── Card Icon ── */
function CardIcon({ link }) {
  const faviconUrl = getFaviconUrl(link);
  const [imgError, setImgError] = React.useState(false);

  return (
    <div className="card-icon" style={{ background: link.tint || '#f0eef4' }}>
      {faviconUrl && !imgError ? (
        <img src={faviconUrl} alt="" onError={() => setImgError(true)} />
      ) : (
        <span className="glyph" style={{ color: link.iconColor || '#7c5ecf' }}>
          {link.glyph || (link.title || '?')[0]}
        </span>
      )}
    </div>
  );
}

/* ── Link Card ── */
function LinkCard({ link, onClick }) {
  return (
    <a
      className="link-card"
      href={link.href || '#'}
      onClick={(e) => { e.preventDefault(); onClick(link); }}
      role="button"
      tabIndex={0}
    >
      <CardIcon link={link} />
      <div className="card-info">
        <div className="card-title">{link.title}</div>
        <div className="card-desc">{link.desc}</div>
      </div>
      <span className="card-arrow"><ArrowRightIcon /></span>
    </a>
  );
}

/* ── Section ── */
function Section({ category, collapsed, onToggle, onCardClick, sectionRef }) {
  return (
    <div className="section-block" ref={sectionRef}>
      <div className="section-header" onClick={onToggle}>
        <div className="section-title-group">
          <span className="section-dot" style={{ background: category.accent || 'var(--purple)' }} />
          <span className="section-title">{category.title}</span>
          <span className="section-subtitle">/ {category.subtitle}</span>
        </div>
        <button className={`section-toggle ${collapsed ? 'collapsed' : ''}`} tabIndex={-1}>
          <ChevronIcon />
        </button>
      </div>
      <div
        className={`card-list ${collapsed ? 'collapsed' : ''}`}
        style={{ maxHeight: collapsed ? 0 : category.links.length * 80 + 100 }}
      >
        {category.links.map((link) => (
          <LinkCard key={link.id} link={link} onClick={onCardClick} />
        ))}
      </div>
    </div>
  );
}

/* ── Settings Panel ── */
function SettingsPanel({ open, onClose, categories, onAddLink, onAddCategory, backgroundImage, onBackgroundUpload, onBackgroundReset }) {
  const [title, setTitle] = React.useState('');
  const [desc, setDesc] = React.useState('');
  const [href, setHref] = React.useState('');
  const [catId, setCatId] = React.useState(categories[0]?.id || 'anomaly');

  if (!open) return null;

  const handleAdd = () => {
    if (!title.trim() || !href.trim()) return;
    onAddLink(catId, {
      id: 'custom-' + Date.now(),
      title: title.trim(),
      desc: desc.trim() || '后来被你亲手放进来的入口。',
      href: href.trim(),
      favicon: null,
      tint: '#f0eef4',
      iconColor: '#7c5ecf',
      glyph: title.trim()[0],
    });
    setTitle(''); setDesc(''); setHref('');
  };

  return (
    <div className="settings-overlay" onClick={onClose}>
      <div className="settings-panel" onClick={(e) => e.stopPropagation()}>
        <div className="settings-head">
          <div className="settings-title">设置</div>
          <button className="settings-close" onClick={onClose}>x</button>
        </div>

        <div className="settings-block">
          <h3>背景图</h3>
          <div className="settings-text">上传你喜欢的背景图。</div>
          <div className="thumb-preview" style={{ backgroundImage: backgroundImage ? `url(${backgroundImage})` : 'none' }} />
          <div className="settings-row">
            <label className="settings-btn">
              上传背景
              <input type="file" accept="image/*" style={{ display: 'none' }} onChange={onBackgroundUpload} />
            </label>
            <button className="settings-btn secondary" onClick={onBackgroundReset}>恢复默认</button>
          </div>
        </div>

        <div className="settings-block">
          <h3>新增链接</h3>
          <label className="settings-label">分类
            <select className="settings-select" value={catId} onChange={(e) => setCatId(e.target.value)}>
              {categories.filter(c => !c.isSettings).map((cat) => <option key={cat.id} value={cat.id}>{cat.title}</option>)}
            </select>
          </label>
          <label className="settings-label">标题
            <input className="settings-input" value={title} onChange={(e) => setTitle(e.target.value)} placeholder="新入口名称" />
          </label>
          <label className="settings-label">链接
            <input className="settings-input" value={href} onChange={(e) => setHref(e.target.value)} placeholder="https://..." />
          </label>
          <label className="settings-label">描述
            <input className="settings-input" value={desc} onChange={(e) => setDesc(e.target.value)} placeholder="这扇门通向哪里" />
          </label>
          <div className="settings-row">
            <button className="settings-btn" onClick={handleAdd}>新增链接</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── App ── */
function App() {
  const { toast, show: showToast } = useToast();
  const [query, setQuery] = React.useState('');
  const [activeTab, setActiveTab] = React.useState('home');
  const [collapsedSections, setCollapsedSections] = React.useState({});
  const [settingsOpen, setSettingsOpen] = React.useState(false);
  const [categories, setCategories] = React.useState(DEFAULT_CATEGORIES);
  const [backgroundImage, setBackgroundImage] = React.useState(() => {
    try { return localStorage.getItem('anomaly-bg') || ''; } catch { return ''; }
  });

  const sectionRefs = React.useRef({});

  // Cmd+K
  React.useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
        e.preventDefault();
        document.getElementById('search-input')?.focus();
      }
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, []);

  // Save bg
  React.useEffect(() => {
    try {
      if (backgroundImage) localStorage.setItem('anomaly-bg', backgroundImage);
      else localStorage.removeItem('anomaly-bg');
    } catch {}
  }, [backgroundImage]);

  const normalizedQuery = query.trim().toLowerCase();

  const displayCategories = React.useMemo(() => {
    let cats = categories.filter(c => !c.isSettings);

    // Filter by search
    if (normalizedQuery) {
      cats = cats.map(cat => ({
        ...cat,
        links: cat.links.filter(link => {
          const hay = [link.title, link.desc, cat.title, cat.subtitle].join(' ').toLowerCase();
          return hay.includes(normalizedQuery);
        }),
      })).filter(cat => cat.links.length > 0);
    }

    // Filter by active tab
    if (activeTab !== 'home' && activeTab !== 'settings') {
      cats = cats.filter(cat => cat.id === activeTab);
    }

    return cats;
  }, [categories, normalizedQuery, activeTab]);

  const openLink = React.useCallback((link) => {
    if (!link.href || link.href === '#') {
      showToast('入口还在留白中...');
      return;
    }
    window.open(link.href, '_blank', 'noopener,noreferrer');
    showToast(`-> ${link.title}`);
  }, [showToast]);

  const toggleSection = (id) => {
    setCollapsedSections(prev => ({ ...prev, [id]: !prev[id] }));
  };

  const handleTabClick = (tabId) => {
    if (tabId === 'settings') {
      setSettingsOpen(true);
      return;
    }
    setActiveTab(tabId);

    // Scroll to section if not home
    if (tabId !== 'home') {
      // Uncollapse the target section
      setCollapsedSections(prev => ({ ...prev, [tabId]: false }));
      setTimeout(() => {
        const el = sectionRefs.current[tabId];
        if (el) {
          el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }, 60);
    } else {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }
  };

  const handleBackgroundUpload = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      setBackgroundImage(reader.result);
      showToast('背景已更新');
    };
    reader.readAsDataURL(file);
  };

  const handleBackgroundReset = () => {
    setBackgroundImage('');
    showToast('已恢复默认背景');
  };

  const handleAddLink = (catId, link) => {
    setCategories(prev => prev.map(cat =>
      cat.id === catId ? { ...cat, links: [...cat.links, link] } : cat
    ));
    showToast(`已添加: ${link.title}`);
  };

  return (
    <>
      {/* Hero */}
      <div className="hero">
        <button className="hero-hamburger" onClick={() => setSettingsOpen(true)}>
          <span /><span /><span />
        </button>
        <div className="hero-content">
          <div className="hero-title">Anomaly Gate</div>
          <div className="hero-sub">给故事、名字与春天留一扇门</div>
          <div className="hero-desc">· 所有被留下的事，都从这里重新发光。</div>
        </div>
      </div>

      {/* Search */}
      <div className="search-wrap">
        <label className="search-bar" htmlFor="search-input">
          <span className="search-icon"><SearchIcon /></span>
          <input
            id="search-input"
            className="search-input"
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder="搜索 portal、记忆、工作台......"
          />
          <span className="search-shortcut">⌘K</span>
        </label>
      </div>

      {/* Content */}
      <div className="content-area">
        {displayCategories.length ? displayCategories.map(cat => (
          <Section
            key={cat.id}
            category={cat}
            collapsed={!!collapsedSections[cat.id]}
            onToggle={() => toggleSection(cat.id)}
            onCardClick={openLink}
            sectionRef={(el) => { sectionRefs.current[cat.id] = el; }}
          />
        )) : (
          <div className="empty-state">没有搜到对应入口，换个词试试。</div>
        )}

        {/* Bottom quote */}
        <div className="bottom-quote">
          ✦ 你一回来，所有入口都会亮起来。
        </div>
      </div>

      {/* Tab Bar */}
      <nav className="tab-bar">
        {TAB_ITEMS.map(tab => (
          <button
            key={tab.id}
            className={`tab-item ${activeTab === tab.id ? 'active' : ''}`}
            onClick={() => handleTabClick(tab.id)}
          >
            <span className="tab-icon"><TabIcon type={tab.icon} /></span>
            <span className="tab-label">{tab.label}</span>
          </button>
        ))}
      </nav>

      {/* Settings */}
      <SettingsPanel
        open={settingsOpen}
        onClose={() => setSettingsOpen(false)}
        categories={categories}
        onAddLink={handleAddLink}
        onAddCategory={() => {}}
        backgroundImage={backgroundImage}
        onBackgroundUpload={handleBackgroundUpload}
        onBackgroundReset={handleBackgroundReset}
      />

      {/* Toast */}
      {toast && (
        <div className="toast-container">
          <div className="toast">{toast}</div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
